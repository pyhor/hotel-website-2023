<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Redirect to actual page after 2 seconds to allow the user to see the splash screen -->
    <meta http-equiv="refresh" content="2; url=Ojingeo-Hotel/home.html">
    <title>Ojingeo Hotel - Redirecting</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #efe5b2; /* Ojingeo-Hotel background color fallback */
            background-image: url('Ojingeo-Hotel/images/layout/background.png');
            background-size: cover;
            background-position: center;
            font-family: Verdana, Geneva, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #4a3728; /* Footer/text color from theme */
        }
        .container {
            text-align: center;
            padding: 3rem 4rem;
            border-radius: 12px;
            background-color: rgba(239, 229, 178, 0.9); /* Solidified theme background */
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            border: 2px solid #4a3728;
            max-width: 500px;
        }
        .logo {
            width: 150px;
            height: auto;
            border-radius: 50%;
            margin-bottom: 1rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border: 3px solid #4a3728;
        }
        h1 {
            margin-top: 0;
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            font-weight: bold;
        }
        .loader {
            border: 4px solid #c0c0d4;
            border-top: 4px solid #4a3728;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #4a3728;
            text-decoration: none;
            font-weight: bold;
            padding: 12px 25px;
            border: 2px solid #4a3728;
            border-radius: 5px;
            transition: all 0.3s ease;
            display: inline-block;
            background-color: transparent;
        }
        a:hover {
            background-color: #4a3728;
            color: #efe5b2;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Ojingeo-Hotel/images/layout/ojingeohotel_logo.jpeg" alt="Ojingeo Hotel Logo" class="logo">
        <h1>Ojingeo Hotel</h1>
        <div class="loader"></div>
        <p>Preparing your room...</p>
        <p style="font-size: 0.9rem; font-weight: normal; margin-bottom: 1rem;">If you are not redirected automatically:</p>
        <a href="Ojingeo-Hotel/home.html">Enter Hotel</a>
    </div>
</body>
</html>
